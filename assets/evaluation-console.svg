<svg width="1280" height="360" viewBox="0 0 1280 360" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">agenteval Evaluation Console</title>
  <desc id="desc">A visual header showing task suites, agent runners, metrics, safety, and comparison outputs.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="360" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0B1020"/>
      <stop offset="0.55" stop-color="#111A35"/>
      <stop offset="1" stop-color="#1C1B3E"/>
    </linearGradient>
    <linearGradient id="trace" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#60A5FA"/>
      <stop offset="0.5" stop-color="#A78BFA"/>
      <stop offset="1" stop-color="#F59E0B"/>
    </linearGradient>
  </defs>

  <rect width="1280" height="360" rx="24" fill="url(#bg)"/>

  <g opacity="0.15">
    <path d="M0 48H1280" stroke="#A5B4FC"/>
    <path d="M0 96H1280" stroke="#A5B4FC"/>
    <path d="M0 144H1280" stroke="#A5B4FC"/>
    <path d="M0 192H1280" stroke="#A5B4FC"/>
    <path d="M0 240H1280" stroke="#A5B4FC"/>
    <path d="M0 288H1280" stroke="#A5B4FC"/>
    <path d="M128 0V360" stroke="#A5B4FC"/>
    <path d="M256 0V360" stroke="#A5B4FC"/>
    <path d="M384 0V360" stroke="#A5B4FC"/>
    <path d="M512 0V360" stroke="#A5B4FC"/>
    <path d="M640 0V360" stroke="#A5B4FC"/>
    <path d="M768 0V360" stroke="#A5B4FC"/>
    <path d="M896 0V360" stroke="#A5B4FC"/>
    <path d="M1024 0V360" stroke="#A5B4FC"/>
    <path d="M1152 0V360" stroke="#A5B4FC"/>
  </g>

  <text x="72" y="82" fill="#DCE7FF" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="16" letter-spacing="3">AGENTEVAL</text>
  <text x="72" y="144" fill="#FFFFFF" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="46" font-weight="700">Agent Evaluation Console</text>
  <text x="72" y="186" fill="#D8CCFF" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="19">Compare accuracy, latency, cost, and safety before an agent reaches production.</text>

  <rect x="72" y="228" width="116" height="34" rx="17" fill="#151B30" stroke="#60A5FA"/>
  <rect x="202" y="228" width="128" height="34" rx="17" fill="#151B30" stroke="#A78BFA"/>
  <rect x="344" y="228" width="112" height="34" rx="17" fill="#151B30" stroke="#F59E0B"/>
  <text x="102" y="250" fill="#DBEAFE" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13">measure</text>
  <text x="233" y="250" fill="#E9D5FF" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13">compare</text>
  <text x="377" y="250" fill="#FDE68A" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13">ship</text>

  <g>
    <rect x="708" y="72" width="188" height="68" rx="14" fill="#13182E" stroke="#60A5FA" stroke-width="1.5"/>
    <rect x="934" y="72" width="258" height="68" rx="14" fill="#13182E" stroke="#A78BFA" stroke-width="1.5"/>
    <rect x="708" y="156" width="188" height="68" rx="14" fill="#13182E" stroke="#A78BFA" stroke-width="1.5"/>
    <rect x="934" y="156" width="258" height="68" rx="14" fill="#13182E" stroke="#F59E0B" stroke-width="1.5"/>
    <rect x="708" y="240" width="188" height="68" rx="14" fill="#13182E" stroke="#F59E0B" stroke-width="1.5"/>
    <rect x="934" y="240" width="258" height="68" rx="14" fill="#13182E" stroke="#22C55E" stroke-width="1.5"/>

    <text x="732" y="98" fill="#93C5FD" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12" letter-spacing="2">INPUT</text>
    <text x="732" y="182" fill="#D8B4FE" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12" letter-spacing="2">RUNNER</text>
    <text x="732" y="266" fill="#FCD34D" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12" letter-spacing="2">OUTPUT</text>

    <text x="732" y="123" fill="#FFFFFF" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="22" font-weight="600">TaskSuite</text>
    <text x="732" y="207" fill="#FFFFFF" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="22" font-weight="600">AgentRunner</text>
    <text x="732" y="291" fill="#FFFFFF" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="22" font-weight="600">Reports</text>

    <text x="960" y="112" fill="#D7DEEA" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="16">YAML, JSON, Python-defined tasks</text>
    <text x="960" y="196" fill="#D7DEEA" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="16">async execution, retries, timeout, repeated runs</text>
    <text x="960" y="280" fill="#D7DEEA" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="16">metrics, safety, comparison, JSON / CSV / Markdown</text>
  </g>

  <path d="M520 246C640 246 634 106 708 106" stroke="url(#trace)" stroke-width="4" stroke-linecap="round"/>
  <path d="M520 246C650 246 634 190 708 190" stroke="url(#trace)" stroke-width="4" stroke-linecap="round"/>
  <path d="M520 246C666 246 632 274 708 274" stroke="url(#trace)" stroke-width="4" stroke-linecap="round"/>

  <circle cx="520" cy="246" r="9" fill="#E2E8F0"/>
  <circle cx="520" cy="246" r="22" fill="none" stroke="#E2E8F0" opacity="0.25"/>

  <text x="72" y="316" fill="#C4B5FD" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13">ACCURACY   /   LATENCY   /   COST   /   SAFETY   /   SIDE-BY-SIDE COMPARISON</text>
</svg>
