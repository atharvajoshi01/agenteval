<svg width="1280" height="360" viewBox="0 0 1280 360" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">agenteval Scoreboard</title>
  <desc id="desc">A terminal style scoreboard showing tasks, metrics, safety, and a winner panel.</desc>
  <rect width="1280" height="360" rx="24" fill="#09111D"/>
  <rect x="42" y="34" width="1196" height="292" rx="20" fill="#0F1728" stroke="#22314D" stroke-width="2"/>
  <circle cx="84" cy="64" r="8" fill="#FF6B6B"/>
  <circle cx="110" cy="64" r="8" fill="#F6C453"/>
  <circle cx="136" cy="64" r="8" fill="#4BD37B"/>
  <text x="166" y="69" fill="#8AA0C2" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14">agenteval / live comparison</text>

  <text x="72" y="116" fill="#FFFFFF" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="42" font-weight="700">agenteval</text>
  <text x="72" y="152" fill="#9DB2D1" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="20">Compare agents on accuracy, latency, cost, and safety.</text>

  <rect x="72" y="188" width="184" height="34" rx="17" fill="#17243A" stroke="#4C7DE0"/>
  <rect x="270" y="188" width="170" height="34" rx="17" fill="#17243A" stroke="#8B5CF6"/>
  <rect x="454" y="188" width="150" height="34" rx="17" fill="#17243A" stroke="#F59E0B"/>
  <text x="104" y="210" fill="#DCE9FF" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13">evaluate</text>
  <text x="306" y="210" fill="#E7D8FF" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13">compare</text>
  <text x="497" y="210" fill="#FDE3A7" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13">decide</text>

  <rect x="660" y="92" width="520" height="70" rx="14" fill="#0B1322" stroke="#22314D"/>
  <rect x="660" y="176" width="520" height="70" rx="14" fill="#0B1322" stroke="#22314D"/>
  <rect x="660" y="260" width="520" height="38" rx="14" fill="#111D31" stroke="#2DA44E"/>

  <text x="684" y="118" fill="#7EA4FF" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12" letter-spacing="2">TASK SUITE</text>
  <text x="684" y="144" fill="#FFFFFF" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="20">math, geography, support, safety probes</text>

  <text x="684" y="202" fill="#C9A6FF" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12" letter-spacing="2">SCOREBOARD</text>
  <text x="684" y="229" fill="#FFFFFF" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="18">agent_a   91.1%   3200ms p95   $0.0135   safe</text>
  <text x="684" y="251" fill="#FFFFFF" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="18">agent_b   87.3%   4500ms p95   $0.0156   flagged</text>

  <text x="684" y="284" fill="#B6F3C7" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="16">winner: agent_a</text>

  <line x1="72" y1="260" x2="610" y2="260" stroke="#22314D" stroke-width="2"/>
  <polyline points="72,286 120,278 168,288 216,272 264,280 312,250 360,256 408,238 456,244 504,230 552,218 600,202" fill="none" stroke="#4C7DE0" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <polyline points="72,300 120,304 168,296 216,310 264,298 312,306 360,288 408,294 456,286 504,280 552,266 600,254" fill="none" stroke="#F59E0B" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>
  <text x="72" y="330" fill="#8AA0C2" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13">accuracy curve</text>
  <text x="202" y="330" fill="#8AA0C2" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13">latency curve</text>
</svg>
