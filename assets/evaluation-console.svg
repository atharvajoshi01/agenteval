<svg width="1280" height="360" viewBox="0 0 1280 360" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">agenteval Match Board</title>
  <desc id="desc">A clean match board showing multiple agents being compared on accuracy, latency, cost, and safety before a winner is chosen.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="360" gradientUnits="userSpaceOnUse">
      <stop stop-color="#08101A"/>
      <stop offset="1" stop-color="#111B2B"/>
    </linearGradient>
  </defs>

  <rect width="1280" height="360" rx="24" fill="url(#bg)"/>
  <rect x="60" y="42" width="1160" height="276" rx="22" fill="#0E1726" stroke="#24344D" stroke-width="2"/>

  <text x="92" y="92" fill="#8FA5CA" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="15" letter-spacing="2">MATCH BOARD</text>
  <text x="92" y="152" fill="#FFFFFF" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="54" font-weight="700">agenteval</text>
  <text x="92" y="194" fill="#B0C1D9" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="24">Run the matchup before you ship the agent.</text>

  <rect x="92" y="226" width="120" height="34" rx="17" fill="#16243A" stroke="#3B82F6"/>
  <text x="122" y="248" fill="#DCE9FF" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13">accuracy</text>
  <rect x="228" y="226" width="108" height="34" rx="17" fill="#19233A" stroke="#8B5CF6"/>
  <text x="256" y="248" fill="#E8DAFF" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13">latency</text>
  <rect x="352" y="226" width="88" height="34" rx="17" fill="#1D2235" stroke="#F59E0B"/>
  <text x="379" y="248" fill="#FEE5B1" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13">cost</text>
  <rect x="456" y="226" width="98" height="34" rx="17" fill="#16283A" stroke="#22C55E"/>
  <text x="484" y="248" fill="#D5F7DE" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13">safety</text>

  <rect x="632" y="74" width="530" height="62" rx="16" fill="#101B2D" stroke="#2B3E5D" stroke-width="2"/>
  <text x="660" y="112" fill="#FFFFFF" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="22">agent_a</text>
  <rect x="818" y="88" width="66" height="22" rx="11" fill="#16243A"/>
  <text x="833" y="103" fill="#DCE9FF" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12">91.1</text>
  <rect x="896" y="88" width="70" height="22" rx="11" fill="#1A233A"/>
  <text x="914" y="103" fill="#E8DAFF" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12">3.2s</text>
  <rect x="978" y="88" width="90" height="22" rx="11" fill="#1D2235"/>
  <text x="995" y="103" fill="#FEE5B1" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12">$0.0135</text>
  <rect x="1080" y="88" width="58" height="22" rx="11" fill="#173425"/>
  <text x="1097" y="103" fill="#D5F7DE" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12">safe</text>

  <rect x="632" y="148" width="530" height="62" rx="16" fill="#101828" stroke="#37435A" stroke-width="2"/>
  <text x="660" y="186" fill="#FFFFFF" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="22">agent_b</text>
  <rect x="818" y="162" width="66" height="22" rx="11" fill="#16243A"/>
  <text x="833" y="177" fill="#DCE9FF" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12">87.3</text>
  <rect x="896" y="162" width="70" height="22" rx="11" fill="#1A233A"/>
  <text x="914" y="177" fill="#E8DAFF" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12">4.5s</text>
  <rect x="978" y="162" width="90" height="22" rx="11" fill="#1D2235"/>
  <text x="995" y="177" fill="#FEE5B1" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12">$0.0156</text>
  <rect x="1080" y="162" width="72" height="22" rx="11" fill="#432416"/>
  <text x="1090" y="177" fill="#FFDAB8" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12">flagged</text>

  <rect x="632" y="222" width="530" height="62" rx="16" fill="#101B2D" stroke="#2B3E5D" stroke-width="2"/>
  <text x="660" y="260" fill="#FFFFFF" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="22">agent_c</text>
  <rect x="818" y="236" width="66" height="22" rx="11" fill="#16243A"/>
  <text x="833" y="251" fill="#DCE9FF" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12">89.7</text>
  <rect x="896" y="236" width="70" height="22" rx="11" fill="#1A233A"/>
  <text x="914" y="251" fill="#E8DAFF" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12">3.9s</text>
  <rect x="978" y="236" width="90" height="22" rx="11" fill="#1D2235"/>
  <text x="995" y="251" fill="#FEE5B1" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12">$0.0121</text>
  <rect x="1080" y="236" width="58" height="22" rx="11" fill="#173425"/>
  <text x="1097" y="251" fill="#D5F7DE" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12">safe</text>

  <rect x="992" y="52" width="142" height="32" rx="16" fill="#163622"/>
  <text x="1022" y="73" fill="#CFF2D7" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13">winner: a</text>

  <path d="M632 304H1162" stroke="#2B3B57" stroke-width="4" stroke-linecap="round"/>
  <circle cx="754" cy="304" r="9" fill="#3B82F6"/>
  <circle cx="902" cy="304" r="9" fill="#8B5CF6"/>
  <circle cx="1046" cy="304" r="9" fill="#F59E0B"/>
  <text x="714" y="330" fill="#8399BD" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13">run</text>
  <text x="870" y="330" fill="#8399BD" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13">score</text>
  <text x="1008" y="330" fill="#8399BD" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13">decide</text>
</svg>
